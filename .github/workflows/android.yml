name: Build Android App Bundle

# Run manually from the Actions tab (Run workflow), or on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon and splash
        run: npx capacitor-assets generate --iconBackgroundColor '#6d5efc' --iconBackgroundColorDark '#11151f' --splashBackgroundColor '#eef0ff' --splashBackgroundColorDark '#11151f'

      - name: Sync web assets into Android
        run: npx cap sync android

      - name: Build release bundle (unsigned)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Decode upload keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload.jks

      - name: Sign the App Bundle
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "Signing $AAB"
          STOREPASS=$(printf '%s' "${{ secrets.KEYSTORE_PASSWORD }}" | tr -d '\r\n')
          ALIAS=$(printf '%s' "${{ secrets.KEY_ALIAS }}" | tr -d '\r\n')
          jarsigner -verbose \
            -keystore upload.jks \
            -storepass "$STOREPASS" \
            -keypass "$STOREPASS" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            "$AAB" "$ALIAS"
          cp "$AAB" boomsweep-release.aab

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: boomsweep-release-aab
          path: boomsweep-release.aab
          if-no-files-found: error
